server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Hide nginx version in headers and error pages.
  server_tokens off;

  # ── Security headers (sent with every response from this server block) ──
  # NOTE: 'unsafe-inline' for scripts/styles is required because the app uses
  # inline <script>/<style> blocks and inline on* event handlers.
  # connect-src 'self' assumes PUBLIC_BACKEND_URL is empty (the default);
  # if you point the frontend at another origin, extend connect-src.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  gzip on;
  gzip_types text/html text/css application/javascript application/json;
  gzip_min_length 1024;

  client_max_body_size 100m;

  # Runtime config must never be cached: it changes with .env, not with builds.
  # (Exact match wins over the regex location below.)
  location = /config.js {
    add_header Cache-Control "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  location ~* \.(js|css|json|woff2?)$ {
    expires 1d;
    add_header Cache-Control "public, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── Backend API (Flask/gunicorn on the internal Docker network) ──
  # "^~" makes these prefix locations win over the static-file regex above.
  location ^~ /api/ {
    proxy_pass         http://backend:9700;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 360s;
    proxy_send_timeout 360s;
  }

  location ^~ /extract {
    proxy_pass         http://backend:9700;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    client_max_body_size 100m;
    proxy_read_timeout 360s;
  }

  location ^~ /job/ {
    proxy_pass         http://backend:9700;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
  }

  location = /health {
    proxy_pass         http://backend:9700;
    proxy_set_header   Host $host;
  }

  location = /stop-all {
    proxy_pass         http://backend:9700;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
  }

  location ^~ /stop-job/ {
    proxy_pass         http://backend:9700;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
  }

  location = /audit {
    proxy_pass         http://backend:9700;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
  }

  # ── MinIO object storage (photos + metadata JSON, anonymous read) ──
  location ^~ /pm-photos/ {
    proxy_pass         http://minio:9000/pm-photos/;
    proxy_set_header   Host $host;
    proxy_read_timeout 120s;
    # Don't leak MinIO/S3 implementation headers to the browser.
    proxy_hide_header  x-amz-request-id;
    proxy_hide_header  x-amz-id-2;
    proxy_hide_header  Server;
  }
}
