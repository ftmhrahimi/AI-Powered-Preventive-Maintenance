name: pm-portal

services:
  backend:
    build: ./backend
    image: pm-portal-backend:latest
    container_name: pm-backend
    env_file: .env
    environment:
      # MinIO is reached over the internal Docker network, not via host IP.
      MINIO_ENDPOINT: minio:9000
    ports:
      - "${BACKEND_PORT:-9700}:9700"
    volumes:
      - backend-data:/app/data        # SQLite databases (users, reports, audit)
      - backend-logs:/app/logs        # application + access logs
      - backend-storage:/app/storage  # uploaded PDF files
    depends_on:
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - pm-net

  frontend:
    build: ./frontend
    image: pm-portal-frontend:latest
    container_name: pm-frontend
    env_file: .env
    environment:
      BACKEND_URL: ${PUBLIC_BACKEND_URL:-}              # empty = same-origin via nginx proxy
      FRONTEND_LLM_MODEL: ${FRONTEND_LLM_MODEL:-./}
      FRONTEND_MINIO_BASE: ${FRONTEND_MINIO_BASE:-/pm-photos}
      FRONTEND_EXTRACT_PHOTOS: ${FRONTEND_EXTRACT_PHOTOS:-false}
      PHOTO_MAX_INDEX: ${PHOTO_MAX_INDEX:-50}
      GPS_RADIUS_METERS: ${GPS_RADIUS_METERS:-300}
      DATE_TOLERANCE_DAYS: ${DATE_TOLERANCE_DAYS:-3}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - pm-net

  # Headless-browser worker: processes users' files server-side so the work
  # continues even after they close the browser / shut down their machine.
  # It drives the exact same frontend pipeline in headless Chromium, so the
  # output is identical to running locally.
  worker:
    build: ./worker
    image: pm-portal-worker:latest
    container_name: pm-worker
    env_file: .env
    environment:
      WORKER_BACKEND_URL: http://backend:9700
      WORKER_FRONTEND_URL: http://frontend
      WORKER_TOKEN: ${WORKER_TOKEN:-}
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-5}
      # How many files process at once (each in its own headless browser).
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - pm-net

  minio:
    image: minio/minio:latest
    container_name: pm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # admin web console (optional)
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - pm-net

  # One-shot init container: creates the bucket and sets the anonymous read
  # policy every time the stack starts. Runs after MinIO is healthy and exits.
  # Using `restart: no` so it doesn't loop; `depends_on: minio-init` in the
  # backend service guarantees the bucket + policy exist before Flask starts.
  minio-init:
    image: minio/minio:latest
    container_name: pm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-pm-photos}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
        mc mb --ignore-existing local/$$MINIO_BUCKET &&
        mc anonymous set download local/$$MINIO_BUCKET &&
        echo 'MinIO bucket policy set: anonymous download on' $$MINIO_BUCKET
      "
    restart: "no"
    networks:
      - pm-net

volumes:
  backend-data:
  backend-logs:
  backend-storage:
  minio-data:

networks:
  pm-net:
    driver: bridge
